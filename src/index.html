<html>
	<head>
		<title>Calculadora</title>

		<!-- Latest compiled and minified CSS -->
		<link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0-beta.2/css/bootstrap.min.css" integrity="sha384-PsH8R72JQ3SOdhVi3uxftmaW6Vc51MKb0q5P2rRUpPvrszuE4W1povHYgTpBfshb" crossorigin="anonymous">

    <style>
      .calculadora {
        margin-top: 40px;
        border: solid 1px #000;
        padding: 20px;
        background-color: #2E2E2E;
        border-radius: 10px;
        box-shadow: 1px 1px 5px #000;
      }

      .btn {
        width: 60px;
        height: 50px;
        margin: 5px;
        box-shadow: 1px 1px 1px #000;
      }

      .clear {
        width: 130px;
      }

      .enter {
        height: 110px;
      }

      .zero {
        width: 130px;
      }

      .resultado {
        text-align: right;
        font-size: 20px;
        margin-top: 10px;
        margin-bottom: 20px;
        border: solid 1px #000;
        box-shadow: 1px 1px 1px #000;
      }

      .cientifica {
        display: none;
      }

      .btn-toggle {
        width: 100%;
        margin-bottom: 10px;
        font-size: 14px;
        padding: 5px;
      }

    </style>
	</head>

  <body style="background: #D9D9D9">

    <div class="container">
      <div class="row">
        <div class="col d-flex justify-content-center">
          <br />

          <div class="calculadora">
            <button type="button" onclick="alternarCientifica()" class="btn btn-info btn-toggle">Modo Científico</button>
            <input type="text" id="campo" class="form-control resultado" placeholder="0" disabled="disabled" />
            
            <div id="cientifica" class="cientifica">
              <div class="row">
                <button type="button" onclick="calcular('acao', 'sin')" class="btn btn-dark btn-lg font-weight-light">sin</button>
                <button type="button" onclick="calcular('acao', 'cos')" class="btn btn-dark btn-lg font-weight-light">cos</button>
                <button type="button" onclick="calcular('acao', 'tan')" class="btn btn-dark btn-lg font-weight-light">tan</button>
                <button type="button" onclick="calcular('acao', 'log')" class="btn btn-dark btn-lg font-weight-light">log</button>
              </div>
              <div class="row">
                <button type="button" onclick="calcular('acao', 'sqrt')" class="btn btn-dark btn-lg font-weight-light">√</button>
                <button type="button" onclick="calcular('acao', 'pow')" class="btn btn-dark btn-lg font-weight-light">x²</button>
                <button type="button" onclick="calcular('valor', '3.1415')" class="btn btn-dark btn-lg font-weight-light">π</button>
                <button type="button" onclick="calcular('valor', '2.7182')" class="btn btn-dark btn-lg font-weight-light">e</button>
              </div>
            </div>

            <div class="row">
              <button type="button" onclick="calcular('acao', 'c')" class="btn btn-dark btn-lg clear font-weight-light">C</button>
              <button type="button" onclick="calcular('acao', '/')" class="btn btn-dark btn-lg font-weight-light">/</button>
              <button type="button" onclick="calcular('acao', '*')" class="btn btn-dark btn-lg font-weight-light">x</button>
            </div>

            <div class="row">
              <button type="button" onclick="calcular('valor', 7)" class="btn btn-dark btn-lg font-weight-light">7</button>
              <button type="button" onclick="calcular('valor', 8)" class="btn btn-dark btn-lg font-weight-light">8</button>
              <button type="button" onclick="calcular('valor', 9)" class="btn btn-dark btn-lg font-weight-light">9</button>
              <button type="button" onclick="calcular('acao', '-')" class="btn btn-dark btn-lg font-weight-light">-</button>
            </div>
            
            <div class="row">
              <button type="button" onclick="calcular('valor', 4)" class="btn btn-dark btn-lg font-weight-light">4</button>
              <button type="button" onclick="calcular('valor', 5)" class="btn btn-dark btn-lg font-weight-light">5</button>
              <button type="button" onclick="calcular('valor', 6)" class="btn btn-dark btn-lg font-weight-light">6</button>
              <button type="button" onclick="calcular('acao', '+')" class="btn btn-dark btn-lg font-weight-light">+</button>
            </div>

            <div class="row">
              <button type="button" onclick="calcular('valor', 1)" class="btn btn-dark btn-lg font-weight-light">1</button>
              <button type="button" onclick="calcular('valor', 2)" class="btn btn-dark btn-lg font-weight-light">2</button>
              <button type="button" onclick="calcular('valor', 3)" class="btn btn-dark btn-lg font-weight-light">3</button>
              <button type="button" onclick="calcular('acao', '=')" class="btn btn-dark btn-lg enter">=</button>
            </div>

            <div class="row" style="margin-top: -60px">
              <button type="button" onclick="calcular('valor', 0)" class="btn btn-dark zero btn-lg font-weight-light">0</button>
              <button type="button" onclick="calcular('acao', '.')" class="btn btn-dark btn-lg font-weight-light">.</button>
            </div>

          </div>
        </div>
      </div>
    </div>   
    
    <script src="javascript.js"></script>
  </body>	

</html>
